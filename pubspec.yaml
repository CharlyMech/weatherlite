name: weatherlite
description: "A Weather App simplified, fully customizable."
publish_to: "none"
version: 1.0.0+1

environment:
   sdk: ^3.10.0

dependencies:
   flutter:
      sdk: flutter

   cupertino_icons: ^1.0.8
   flutter_bloc: ^9.1.1
   equatable: ^2.0.8
   dio: ^5.9.2
   geolocator: ^14.0.2
   geocoding: ^3.0.0
   isar: ^3.1.0+1
   isar_flutter_libs: ^3.1.0+1
   path_provider: ^2.1.5
   shared_preferences: ^2.5.4
   flutter_staggered_grid_view: ^0.7.0
   fl_chart: ^1.2.0
   flutter_animate: ^4.5.2
   rive: ^0.14.4
   intl: ^0.20.2
   google_fonts: ^8.0.2
   go_router: ^15.1.2
   flutter_native_splash: ^2.4.5
   iconoir_flutter: ^7.11.0
   flutter_launcher_icons: ^0.14.4
   package_info_plus: ^8.2.1

dev_dependencies:
   flutter_test:
      sdk: flutter
   flutter_lints: ^6.0.0
   build_runner: ^2.4.13
   isar_generator: ^3.1.0+1

flutter:
   uses-material-design: true
   assets:
      - assets/splash/
      - assets/icon/

# ── flutter_native_splash ─────────────────────────────────────────────────
# Ejecutar después de cambios: dart run flutter_native_splash:create
flutter_native_splash:
   color: "#0A1929"          # dark background (ThemeType.dark backgroundColor)
   color_dark: "#0A1929"
   # image: assets/splash/logo.png   # descomentar cuando haya logo
   fullscreen: true
   android_12:
      color: "#0A1929"
      color_dark: "#0A1929"
